{% extends 'base.html' %}


{% block title %}
Login
{% endblock %}

{% block content %}

<h2>Login</h2>

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}

<form method="POST">

    {% csrf_token %}

    <p>
        Username:
        <input
            type="text"
            name="username"
        >
    </p>

    <p>
        Password:
        <input
            type="password"
            name="password"
        >
    </p>

    <button type="submit">
        Login
    </button>

</form>

<hr>

<h3>OR</h3>

<a href="/accounts/google/login/">
    Continue with Google
</a>

<p>
    Don't have an account?
    <a href="{% url 'signup' %}">
        Sign Up
    </a>
</p>

{% endblock %}
