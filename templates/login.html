{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1 class="auth-title">
            Welcome Back 👋
        </h1>

        <p class="auth-subtitle">
            Sign in to continue
        </p>

        {% for message in messages %}
        <div class="alert alert-warning">
            {{ message }}
        </div>
        {% endfor %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control auth-input"
                    placeholder="Enter username"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control auth-input"
                    placeholder="Enter password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn auth-btn w-100"
            >
                Login
            </button>

        </form>

        <div class="divider">
            OR
        </div>

        <a
            href="/accounts/google/login/"
            class="google-btn"
        >
            <i class="fa-brands fa-google"></i>
            Continue with Google
        </a>

        <p class="mt-4 text-center">

            Don't have an account?

            <a href="/signup/" class="auth-link">
                Sign Up
            </a>

        </p>

    </div>

</div>

{% endblock %}
