{% extends 'base.html' %}

{% block title %}
Signup
{% endblock %}

{% block content %}

<h2>Signup</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Sign Up
    </button>

</form>

<hr>

<h3>OR</h3>

<a href="/accounts/google/login/">
    Continue with Google
</a>

<p>
    Already have an account?
    <a href="{% url 'login' %}">
        Login
    </a>
</p>

{% endblock %}
